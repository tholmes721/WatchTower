<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WatchTower — Login</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .login-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: var(--shadow);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      justify-content: center;
    }
    .login-logo .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: url('/static/watchtower.jpg') center 25% / cover no-repeat;
      border: 1px solid var(--border-light);
    }
    .login-logo .logo-name {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
    }
    .login-card h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 20px;
      text-align: center;
    }
    .login-error {
      background: rgba(248,114,114,0.12);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .login-card .form-group { margin-bottom: 16px; }
    .login-card .btn-primary {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <!-- Classification banner -->
  <div id="classification-banner" class="classification-banner hidden"></div>

  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon"></div>
        <span class="logo-name">WatchTower</span>
      </div>
      <h2>Sign in to continue</h2>
      <div id="login-error" class="login-error"></div>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" required autofocus autocomplete="username" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary" id="login-btn">Sign In</button>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('login-username').value,
            password: document.getElementById('login-password').value,
          }),
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.detail || 'Login failed');
        }
        const user = await res.json();
        localStorage.setItem('watchtower_user', JSON.stringify(user));
        window.location.href = '/';
      } catch (err) {
        errEl.textContent = err.message;
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
    // Load classification banner
    (async () => {
      try {
        const res = await fetch('/api/banner');
        if (!res.ok) return;
        const config = await res.json();
        if (!config.enabled || !config.text) return;
        const el = document.getElementById('classification-banner');
        el.textContent = config.text;
        el.style.backgroundColor = config.color || '#4f8ef7';
        el.style.color = config.text_color || '#ffffff';
        el.classList.remove('hidden');
      } catch (e) {}
    })();
    // If already logged in, redirect to dashboard
    (async () => {
      try {
        const res = await fetch('/api/auth/me');
        if (res.ok) window.location.href = '/';
      } catch (e) {}
    })();
  </script>
</body>
</html>
